<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АвтоМаркет</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Верхняя панель -->
    <header class="header">
        <div class="header-content">
            <span class="header-icon">🚗</span>
            <h1 class="header-title">АвтоМаркет</h1>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="main-content" id="mainPage">
        <!-- Поиск -->
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Марка, модель или запрос..."
                >
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters-section">
            <div class="filters-scroll">
                <button class="filter-chip active" data-filter="all">Все авто</button>
                <button class="filter-chip" data-filter="price" id="priceFilter">Цена до...</button>
                <button class="filter-chip" data-filter="used">С пробегом</button>
                <button class="filter-chip" data-filter="year" id="yearFilter">Год от...</button>
                <button class="filter-chip" data-filter="city" id="cityFilter">Город</button>
            </div>
        </div>

        <!-- Модальные окна фильтров -->
        <div id="priceModal" class="modal">
            <div class="modal-content">
                <h3>Цена до (₽)</h3>
                <input type="number" id="priceInput" placeholder="Например: 1500000">
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="closeModal('priceModal')">Отмена</button>
                    <button class="btn-primary" onclick="applyPriceFilter()">Применить</button>
                </div>
            </div>
        </div>

        <div id="yearModal" class="modal">
            <div class="modal-content">
                <h3>Год от</h3>
                <input type="number" id="yearInput" placeholder="Например: 2015" min="1990" max="2025">
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="closeModal('yearModal')">Отмена</button>
                    <button class="btn-primary" onclick="applyYearFilter()">Применить</button>
                </div>
            </div>
        </div>

        <div id="cityModal" class="modal">
            <div class="modal-content">
                <h3>Выберите город</h3>
                <select id="citySelect" class="city-select">
                    <option value="">Все города</option>
                    <option value="Москва">Москва</option>
                    <option value="Санкт-Петербург">Санкт-Петербург</option>
                    <option value="Казань">Казань</option>
                    <option value="Новосибирск">Новосибирск</option>
                    <option value="Екатеринбург">Екатеринбург</option>
                    <option value="Краснодар">Краснодар</option>
                </select>
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="closeModal('cityModal')">Отмена</button>
                    <button class="btn-primary" onclick="applyCityFilter()">Применить</button>
                </div>
            </div>
        </div>

        <!-- Топ объявления -->
        <section class="section">
            <h2 class="section-title">🔥 Топ объявления</h2>
            <div id="topListings" class="listings-grid"></div>
        </section>

        <!-- Новые поступления -->
        <section class="section">
            <h2 class="section-title">✨ Новые поступления</h2>
            <div id="newListings" class="listings-grid"></div>
        </section>
    </main>

    <!-- Страница добавления объявления -->
    <div id="addPage" class="add-page hidden">
        <div class="detail-header">
            <button class="back-button" onclick="closePage('addPage')">← Назад</button>
        </div>
        <div class="add-content">
            <h2 class="add-title">➕ Подать объявление</h2>
            
            <form id="addCarForm" class="add-form">
                <div class="form-group">
                    <label>Марка автомобиля</label>
                    <input type="text" id="carBrand" placeholder="Например: Toyota" required>
                </div>

                <div class="form-group">
                    <label>Модель</label>
                    <input type="text" id="carModel" placeholder="Например: Camry" required>
                </div>

                <div class="form-group">
                    <label>Год выпуска</label>
                    <input type="number" id="carYear" placeholder="2020" min="1990" max="2025" required>
                </div>

                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="carPrice" placeholder="2500000" required>
                </div>

                <div class="form-group">
                    <label>Пробег (км)</label>
                    <input type="number" id="carMileage" placeholder="45000" required>
                </div>

                <div class="form-group">
                    <label>Объём двигателя</label>
                    <input type="text" id="carEngine" placeholder="2.5 л" required>
                </div>

                <div class="form-group">
                    <label>Коробка передач</label>
                    <select id="carTransmission" required>
                        <option value="">Выберите</option>
                        <option value="Автомат">Автомат</option>
                        <option value="Механика">Механика</option>
                        <option value="Робот">Робот</option>
                        <option value="Вариатор">Вариатор</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Тип топлива</label>
                    <select id="carFuel" required>
                        <option value="">Выберите</option>
                        <option value="Бензин">Бензин</option>
                        <option value="Дизель">Дизель</option>
                        <option value="Электро">Электро</option>
                        <option value="Гибрид">Гибрид</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Город</label>
                    <select id="carCity" required>
                        <option value="">Выберите город</option>
                        <option value="Москва">Москва</option>
                        <option value="Санкт-Петербург">Санкт-Петербург</option>
                        <option value="Казань">Казань</option>
                        <option value="Новосибирск">Новосибирск</option>
                        <option value="Екатеринбург">Екатеринбург</option>
                        <option value="Краснодар">Краснодар</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="carDescription" placeholder="Расскажите о состоянии автомобиля..." rows="4" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Опубликовать объявление</button>
            </form>
        </div>
    </div>

    <!-- Детальная страница авто -->
    <div id="detailPage" class="detail-page hidden">
        <div class="detail-header">
            <button class="back-button" onclick="closeDetailPage()">← Назад</button>
        </div>
        <div id="detailContent" class="detail-content"></div>
    </div>

    <!-- Нижняя панель навигации -->
    <nav class="bottom-nav">
        <button class="nav-button active" data-page="main" onclick="navigateTo('main')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-button" data-page="add" onclick="navigateTo('add')">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Подать</span>
        </button>
        <button class="nav-button" data-page="messages" onclick="navigateTo('messages')">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Сообщения</span>
        </button>
        <button class="nav-button" data-page="favorites" onclick="navigateTo('favorites')">
            <span class="nav-icon">❤️</span>
            <span class="nav-label">Избранное</span>
        </button>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
