<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АвтоМаркет - Telegram Mini App</title>
    <style>
        /* =========================
           Глобальные стили и сброс
           ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #40a7e3;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f4f4f5;
            --primary-color: #3390ec;
            --secondary-color: #f4f4f5;
            --border-color: #e5e5ea;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            line-height: 1.5;
            overflow-x: hidden;
            padding-bottom: 70px;
        }

        .header {
            position: sticky;
            top: 0;
            background: var(--tg-theme-bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            font-size: 24px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
        }

        .main-content {
            padding: 16px;
            padding-bottom: 80px;
        }

        .search-section {
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--secondary-color);
            border-radius: var(--radius);
            padding: 10px 12px;
            gap: 8px;
        }

        .search-icon {
            font-size: 18px;
            opacity: 0.6;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            color: var(--tg-theme-text-color);
        }

        .search-input::placeholder {
            color: var(--tg-theme-hint-color);
        }

        .filters-section {
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .filters-scroll {
            display: flex;
            gap: 8px;
            padding-bottom: 4px;
        }

        .filter-chip {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-chip:active {
            transform: scale(0.95);
        }

        .filter-chip.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--tg-theme-bg-color);
            border-radius: var(--radius);
            padding: 24px;
            margin: 16px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 600;
        }

        .modal-content input,
        .city-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: var(--tg-theme-text-color);
        }

        .btn-primary:active,
        .btn-secondary:active {
            opacity: 0.8;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .listings-grid {
            display: grid;
            gap: 12px;
        }

        .car-card {
            background: var(--tg-theme-bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }

        .car-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow);
        }

        .car-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--secondary-color);
        }

        .car-info {
            padding: 12px;
        }

        .car-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .car-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .car-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 6px;
        }

        .car-spec {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .car-location {
            font-size: 13px;
            color: var(--tg-theme-hint-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .detail-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--tg-theme-bg-color);
            z-index: 200;
            overflow-y: auto;
            transition: transform 0.3s;
        }

        .detail-page.hidden {
            transform: translateX(100%);
        }

        .detail-header {
            position: sticky;
            top: 0;
            background: var(--tg-theme-bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            z-index: 10;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 16px;
            color: var(--primary-color);
            cursor: pointer;
            padding: 8px 0;
            font-weight: 500;
        }

        .detail-content {
            padding: 0 0 80px 0;
        }

        .detail-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: var(--secondary-color);
        }

        .detail-info {
            padding: 16px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .detail-price {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .detail-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-section:last-child {
            border-bottom: none;
        }

        .detail-section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .detail-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-spec-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-spec-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color);
        }

        .detail-spec-value {
            font-size: 15px;
            font-weight: 500;
        }

        .detail-description {
            font-size: 15px;
            line-height: 1.6;
            color: var(--tg-theme-text-color);
        }

        .detail-contact-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .detail-contact-btn:active {
            opacity: 0.8;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--tg-theme-bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }

        .nav-button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tg-theme-hint-color);
            transition: all 0.2s;
        }

        .nav-button.active {
            color: var(--primary-color);
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        .filters-scroll::-webkit-scrollbar {
            display: none;
        }

        .filters-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--tg-theme-hint-color);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state-text {
            font-size: 16px;
        }

        @media (min-width: 768px) {
            .listings-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .main-content {
                max-width: 1200px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <header class="header">
        <div class="header-content">
            <span class="header-icon">🚗</span>
            <h1 class="header-title">АвтоМаркет</h1>
        </div>

    <!-- Основной контент -->
    <main class="main-content">
        <!-- Поиск -->
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Марка, модель или запрос..."
                >
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters-section">
            <div class="filters-scroll">
                <button class="filter-chip active" data-filter="all">Все авто</button>
                <button class="filter-chip" data-filter="price" id="priceFilter">Цена до...</button>
                <button class="filter-chip" data-filter="used">С пробегом</button>
                <button class="filter-chip" data-filter="year" id="yearFilter">Год от...</button>
                <button class="filter-chip" data-filter="city" id="cityFilter">Город</button>
            </div>
        </div>

        <!-- Модальное окно фильтра цены -->
        <div id="priceModal" class="modal">
            <div class="modal-content">
                <h3>Цена до (₽)</h3>
                <input type="number" id="priceInput" placeholder="Например: 1500000">
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="closeModal('priceModal')">Отмена</button>
                    <button class="btn-primary" onclick="applyPriceFilter()">Применить</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно фильтра года -->
        <div id="yearModal" class="modal">
            <div class="modal-content">
                <h3>Год от</h3>
                <input type="number" id="yearInput" placeholder="Например: 2015" min="1990" max="2025">
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="closeModal('yearModal')">Отмена</button>
                    <button class="btn-primary" onclick="applyYearFilter()">Применить</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно фильтра города -->
        <div id="cityModal" class="modal">
            <div class="modal-content">
                <h3>Выберите город</h3>
                <select id="citySelect" class="city-select">
                    <option value="">Все города</option>
                    <option value="Москва">Москва</option>
                    <option value="Санкт-Петербург">Санкт-Петербург</option>
                    <option value="Казань">Казань</option>
                    <option value="Новосибирск">Новосибирск</option>
                    <option value="Екатеринбург">Екатеринбург</option>
                    <option value="Краснодар">Краснодар</option>
                </select>
                <div class="modal-buttons">
                    <button class="btn-secondary" onclick="closeModal('cityModal')">Отмена</button>
                    <button class="btn-primary" onclick="applyCityFilter()">Применить</button>
                </div>
            </div>
        </div>

        <!-- Топ объявления -->
        <section class="section">
            <h2 class="section-title">🔥 Топ объявления</h2>
            <div id="topListings" class="listings-grid"></div>
        </section>

        <!-- Новые поступления -->
        <section class="section">
            <h2 class="section-title">✨ Новые поступления</h2>
            <div id="newListings" class="listings-grid"></div>
        </section>

        <!-- Детальная страница авто -->
        <div id="detailPage" class="detail-page hidden">
            <div class="detail-header">
                <button class="back-button" onclick="closeDetailPage()">← Назад</button>
            </div>
            <div id="detailContent" class="detail-content"></div>
        </div>
    </main>

    <!-- Нижняя панель навигации -->
    <nav class="bottom-nav">
        <button class="nav-button active" data-page="main" onclick="navigateTo('main')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-button" data-page="add" onclick="navigateTo('add')">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Подать</span>
        </button>
        <button class="nav-button" data-page="messages" onclick="navigateTo('messages')">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Сообщения</span>
        </button>
        <button class="nav-button" data-page="favorites" onclick="navigateTo('favorites')">
            <span class="nav-icon">❤️</span>
            <span class="nav-label">Избранное</span>
        </button>
    </nav>

                isTop: false,

        let currentFilters = {
            search: '',
            maxPrice: null,
            minYear: null,
            city: '',
            usedOnly: false
        };

        let favoriteCars = [];
        let currentDetailCar = null;

        document.addEventListener('DOMContentLoaded', initializeApp);

        function initializeApp() {
            loadFavorites();
            renderCars();
            initializeEventListeners();
        }

        function initializeEventListeners() {
            document.getElementById('searchInput').addEventListener('input', debounce(handleSearch, 300));
            
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', handleFilterClick);
            });
            
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        closeModal(modal.id);
                    }
                });
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        function handleSearch(e) {
            currentFilters.search = e.target.value.toLowerCase();
            renderCars();
        }

        function handleFilterClick(e) {
            const filterType = e.target.dataset.filter;
            
            if (filterType === 'all') {
                resetFilters();
                return;
            }
            
            if (filterType === 'price') {
                openModal('priceModal');
            } else if (filterType === 'year') {
                openModal('yearModal');
            } else if (filterType === 'city') {
                openModal('cityModal');
            } else if (filterType === 'used') {
                currentFilters.usedOnly = !currentFilters.usedOnly;
                e.target.classList.toggle('active');
                renderCars();
            }
        }

        function resetFilters() {
            currentFilters = {
                search: '',
                maxPrice: null,
                minYear: null,
                city: '',
                usedOnly: false
            };
            
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.dataset.filter === 'all') {
                    chip.classList.add('active');
                }
            });
            
            document.getElementById('priceFilter').textContent = 'Цена до...';
            document.getElementById('yearFilter').textContent = 'Год от...';
            document.getElementById('cityFilter').textContent = 'Город';
            
            renderCars();
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function applyPriceFilter() {
            const price = parseInt(document.getElementById('priceInput').value);
            
            if (price && price > 0) {
                currentFilters.maxPrice = price;
                document.getElementById('priceFilter').textContent = `До ${formatPrice(price)}`;
                document.getElementById('priceFilter').classList.add('active');
            }
            
            closeModal('priceModal');
            renderCars();
        }

        function applyYearFilter() {
            const year = parseInt(document.getElementById('yearInput').value);
            
            if (year && year >= 1990 && year <= 2025) {
                currentFilters.minYear = year;
                document.getElementById('yearFilter').textContent = `От ${year} г.`;
                document.getElementById('yearFilter').classList.add('active');
            }
            
            closeModal('yearModal');
            renderCars();
        }

        function applyCityFilter() {
            const city = document.getElementById('citySelect').value;
            currentFilters.city = city;
            
            if (city) {
                document.getElementById('cityFilter').textContent = city;
                document.getElementById('cityFilter').classList.add('active');
            } else {
                document.getElementById('cityFilter').textContent = 'Город';
                document.getElementById('cityFilter').classList.remove('active');
            }
            
            closeModal('cityModal');
            renderCars();
        }

        function filterCars(cars) {
            return cars.filter(car => {
                if (currentFilters.search) {
                    const searchStr = `${car.brand} ${car.model}`.toLowerCase();
                    if (!searchStr.includes(currentFilters.search)) return false;
                }
                
                if (currentFilters.maxPrice && car.price > currentFilters.maxPrice) return false;
                if (currentFilters.minYear && car.year < currentFilters.minYear) return false;
                if (currentFilters.city && car.city !== currentFilters.city) return false;
                if (currentFilters.usedOnly && car.mileage < 1000) return false;
                
                return true;
            });
        }

        function renderCars() {
            const filteredCars = filterCars(carsData);
            const topCars = filteredCars.filter(car => car.isTop);
            const newCars = filteredCars.filter(car => car.isNew);
            
            renderCarSection('topListings', topCars);
            renderCarSection('newListings', newCars);
        }

        function renderCarSection(containerId, cars) {
            const container = document.getElementById(containerId);
            
            if (cars.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">Ничего не найдено</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = cars.map(car => createCarCard(car)).join('');
        }

        function createCarCard(car) {
            return `
                <div class="car-card" onclick="openDetailPage(${car.id})">
                    <img src="${car.image}" alt="${car.brand} ${car.model}" class="car-image">
                    <div class="car-info">
                        <div class="car-title">${car.brand} ${car.model} ${car.year}</div>
                        <div class="car-price">${formatPrice(car.price)} ₽</div>
                        <div class="car-specs">
                            <span class="car-spec">⚙️ ${car.engine}</span>
                            <span class="car-spec">📊 ${formatMileage(car.mileage)} км</span>
                            <span class="car-spec">⛽ ${car.fuel}</span>
                        </div>
                        <div class="car-location">📍 ${car.city}</div>
                    </div>
                </div>
            `;
        }

        function openDetailPage(carId) {
            const car = carsData.find(c => c.id === carId);
            if (!car) return;
            
            currentDetailCar = car;
            const isFavorite = favoriteCars.includes(car.id);
            
            document.getElementById('detailContent').innerHTML = `
                <img src="${car.image}" alt="${car.brand} ${car.model}" class="detail-image">
                <div class="detail-info">
                    <div class="detail-title">${car.brand} ${car.model}</div>
                    <div class="detail-price">${formatPrice(car.price)} ₽</div>
                    
                    <div class="detail-section">
                        <div class="detail-section-title">Характеристики</div>
                        <div class="detail-specs">
                            <div class="detail-spec-item">
                                <div class="detail-spec-label">Год выпуска</div>
                                <div class="detail-spec-value">${car.year}</div>
                            </div>
                            <div class="detail-spec-item">
                                <div class="detail-spec-label">Пробег</div>
                                <div class="detail-spec-value">${formatMileage(car.mileage)} км</div>
                            </div>
                            <div class="detail-spec-item">
                                <div class="detail-spec-label">Двигатель</div>
                                <div class="detail-spec-value">${car.engine}</div>
                            </div>
                            <div class="detail-spec-item">
                                <div class="detail-spec-label">Коробка</div>
                                <div class="detail-spec-value">${car.transmission}</div>
                            </div>
                            <div class="detail-spec-item">
                                <div class="detail-spec-label">Топливо</div>
                                <div class="detail-spec-value">${car.fuel}</div>
                            </div>
                            <div class="detail-spec-item">
                                <div class="detail-spec-label">Город</div>
                                <div class="detail-spec-value">${car.city}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <div class="detail-section-title">Описание</div>
                        <div class="detail-description">${car.description}</div>
                    </div>
                    
                    <button class="detail-contact-btn" onclick="toggleFavorite(${car.id})">
                        ${isFavorite ? '❤️ В избранном' : '🤍 Добавить в избранное'}
                    </button>
                </div>
            `;
            
            document.getElementById('detailPage').classList.remove('hidden');
        }

        function closeDetailPage() {
            document.getElementById('detailPage').classList.add('hidden');
            currentDetailCar = null;
        }

        function toggleFavorite(carId) {
            const index = favoriteCars.indexOf(carId);
            
            if (index > -1) {
                favoriteCars.splice(index, 1);
            } else {
                favoriteCars.push(carId);
            }
            
            saveFavorites();
            
            if (currentDetailCar && currentDetailCar.id === carId) {
                openDetailPage(carId);
            }
            
            const isFavorite = favoriteCars.includes(carId);
            alert(isFavorite ? 'Добавлено в избранное' : 'Удалено из избранного');
        }

        function loadFavorites() {
            const stored = localStorage.getItem('favoriteCars');
            if (stored) {
                favoriteCars = JSON.parse(stored);
            }
        }

        function saveFavorites() {
            localStorage.setItem('favoriteCars', JSON.stringify(favoriteCars));
        }

        function navigateTo(page) {
            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.page === page) {
                    btn.classList.add('active');
                }
            });
            
            if (page === 'main') {
                closeDetailPage();
            } else if (page === 'add') {
                alert('Функция "Подать объявление" будет доступна в следующей версии!');
            } else if (page === 'messages') {
                alert('Раздел "Сообщения" в разработке');
            } else if (page === 'favorites') {
                showFavorites();
            }
        }

        function showFavorites() {
            if (favoriteCars.length === 0) {
                alert('У вас пока нет избранных объявлений');
                return;
            }
            
            const favCars = carsData.filter(car => favoriteCars.includes(car.id));
            const message = `Избранное (${favCars.length}):\n\n` + 
                favCars.map(car => `${car.brand} ${car.model} - ${formatPrice(car.price)} ₽`).join('\n');
            
            alert(message);
        }

        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        function formatMileage(mileage) {
            return mileage.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }
    </script>
</body>
</html>
