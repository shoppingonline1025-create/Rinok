<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>АвтоМаркет</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a1a;--bg2:#2a2a2a;--card:#242424;--text:#fff;--text2:#b0b0b0;--hint:#707070;--primary:#4a9eff;--border:#3a3a3a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:70px}
.header{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;z-index:100;display:flex;align-items:center;gap:8px}
.header-icon{font-size:24px}
.header-title{font-size:20px;font-weight:600}
.main-content{padding:12px 8px 80px}
.search-box{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;gap:8px;margin:0 4px 12px}
.search-input{flex:1;border:none;background:transparent;font-size:16px;outline:none;color:var(--text)}
.search-input::placeholder{color:var(--hint)}
.categories-scroll,.filters-scroll{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding:0 4px;-webkit-overflow-scrolling:touch}
.categories-scroll::-webkit-scrollbar,.filters-scroll::-webkit-scrollbar{display:none}
.category-chip,.filter-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.category-chip.active,.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin:16px 4px 10px;cursor:pointer}
.section-header:hover .section-title{color:var(--primary)}
.section-title{font-size:17px;font-weight:600}
.section-view-all{font-size:13px;color:var(--primary);font-weight:500}
.listings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.car-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer}
.car-card:active{transform:scale(.98)}
.car-image{width:100%;height:140px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:50px;position:relative}
.car-gallery{width:100%;height:140px;position:relative;overflow:hidden;background:var(--bg2)}
.car-gallery img{width:100%;height:100%;object-fit:cover}
.gallery-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.gallery-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}
.gallery-dot.active{background:#fff}
.gallery-arrows{position:absolute;top:50%;width:100%;display:flex;justify-content:space-between;padding:0 8px;transform:translateY(-50%);z-index:3;pointer-events:none}
.gallery-arrow{width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;pointer-events:all}
.category-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:500}
.car-info{padding:8px}
.car-title{font-size:13px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.car-price{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:6px}
.car-specs{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;color:var(--text2);margin-bottom:4px}
.car-location{font-size:11px;color:var(--text2)}
.car-registration{font-size:10px;color:var(--primary);font-weight:500;margin-top:4px}
.car-date{font-size:10px;color:var(--hint);margin-top:4px}
.detail-page,.add-page,.list-page{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .3s}
.detail-page.show,.add-page.show,.list-page.show{transform:translateX(0)}
.detail-header{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;z-index:10}
.back-button{background:none;border:none;font-size:16px;color:var(--primary);cursor:pointer;padding:8px 0;font-weight:500}
.detail-gallery{width:100%;height:300px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:150px;position:relative;overflow:hidden}
.detail-gallery img{width:100%;height:100%;object-fit:cover;display:none}
.detail-gallery img.active{display:block}
.detail-gallery-arrows{position:absolute;top:50%;width:100%;display:flex;justify-content:space-between;padding:0 12px;transform:translateY(-50%)}
.detail-gallery-arrow{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.detail-info{padding:16px}
.detail-title{font-size:22px;font-weight:700;margin-bottom:8px}
.detail-date{font-size:13px;color:var(--text2);margin-bottom:12px}
.detail-price{font-size:26px;font-weight:700;color:var(--primary);margin-bottom:20px}
.detail-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.detail-section-title{font-size:16px;font-weight:600;margin-bottom:12px}
.detail-specs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.detail-spec-item{display:flex;flex-direction:column;gap:4px}
.detail-spec-label{font-size:13px;color:var(--text2)}
.detail-spec-value{font-size:15px;font-weight:500}
.detail-contact-btn{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.add-content,.list-content{padding:16px 16px 80px}
.add-title,.list-title{font-size:22px;font-weight:700;margin-bottom:20px}
.add-form{display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:14px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:12px;border:1px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;background:var(--card);color:var(--text)}
.form-group textarea{resize:vertical;min-height:100px}
.file-upload{display:flex;flex-direction:column;gap:12px}
.file-upload-btn{padding:12px;border:2px dashed var(--border);border-radius:8px;background:var(--card);cursor:pointer;text-align:center;color:var(--text2)}
.file-upload input{display:none}
.file-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.file-preview-item{position:relative;width:100%;padding-top:100%;border-radius:8px;overflow:hidden;background:var(--bg2)}
.file-preview-item img,.file-preview-item video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.file-preview-remove{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.8);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.submit-btn{padding:16px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;z-index:100}
.nav-button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;background:none;border:none;cursor:pointer;color:var(--hint)}
.nav-button.active{color:var(--primary)}
.nav-icon{font-size:22px}
.nav-label{font-size:11px;font-weight:500}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:var(--bg2);border-radius:12px;padding:24px;margin:16px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto}
.modal-content h3{margin-bottom:16px;font-size:18px;font-weight:600}
.modal-content input,.modal-content select{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:16px;margin-bottom:16px;background:var(--card);color:var(--text)}
.range-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:16px}
.range-inputs span{text-align:center;color:var(--text2)}
.modal-buttons{display:flex;gap:8px}
.btn-primary,.btn-secondary{flex:1;padding:12px;border-radius:8px;border:none;font-size:16px;font-weight:500;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--card);color:var(--text)}
.empty-state{text-align:center;padding:40px 20px;color:var(--hint);grid-column:1/-1}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.currency-selector{display:flex;gap:8px;margin-bottom:12px}
.currency-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);cursor:pointer;font-size:14px}
.currency-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
</style>
</head>
<body>
<header class="header">
<span class="header-icon">🚗</span>
<h1 class="header-title">АвтоМаркет</h1>
</header>
<main class="main-content" id="mainPage">
<div class="search-box">
<span class="search-icon">🔍</span>
<input type="text" id="searchInput" class="search-input" placeholder="Марка, модель...">
</div>
<div class="categories-scroll">
<button class="category-chip active" data-category="all" onclick="selectCategory('all')">Все</button>
<button class="category-chip" data-category="car" onclick="selectCategory('car')">🚗 Легковые</button>
<button class="category-chip" data-category="truck" onclick="selectCategory('truck')">🚚 Грузовые</button>
<button class="category-chip" data-category="special" onclick="selectCategory('special')">🚜 Спецтехника</button>
<button class="category-chip" data-category="moto" onclick="selectCategory('moto')">🏍 Мототехника</button>
<button class="category-chip" data-category="water" onclick="selectCategory('water')">🚤 Водный</button>
</div>
<div class="filters-scroll">
<button class="filter-chip active" onclick="resetFilters()">Сбросить</button>
<button class="filter-chip" id="brandFilter" onclick="openModal('brandModal')">Марка</button>
<button class="filter-chip" id="modelFilter" onclick="openModal('modelModal')">Модель</button>
<button class="filter-chip" id="priceFilter" onclick="openModal('priceModal')">Цена</button>
<button class="filter-chip" id="yearFilter" onclick="openModal('yearModal')">Год</button>
<button class="filter-chip" id="mileageFilter" onclick="openModal('mileageModal')">Пробег</button>
<button class="filter-chip" id="cityFilter" onclick="openModal('cityModal')">Город</button>
<button class="filter-chip" id="regFilter" onclick="openModal('regModal')">Регистрация</button>
</div>
<div id="brandModal" class="modal">
<div class="modal-content">
<h3>Марка</h3>
<select id="brandSelect"></select>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('brandModal')">Отмена</button>
<button class="btn-primary" onclick="applyBrand()">Применить</button>
</div>
</div>
</div>
<div id="modelModal" class="modal">
<div class="modal-content">
<h3>Модель</h3>
<select id="modelSelect"></select>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('modelModal')">Отмена</button>
<button class="btn-primary" onclick="applyModel()">Применить</button>
</div>
</div>
</div>
<div id="priceModal" class="modal">
<div class="modal-content">
<h3>Цена</h3>
<div class="currency-selector">
<button class="currency-btn active" onclick="setCurrency('$')">$ USD</button>
<button class="currency-btn" onclick="setCurrency('€')">€ EUR</button>
</div>
<div class="range-inputs">
<input type="number" id="priceFrom" placeholder="От">
<span>—</span>
<input type="number" id="priceTo" placeholder="До">
</div>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('priceModal')">Отмена</button>
<button class="btn-primary" onclick="applyPrice()">Применить</button>
</div>
</div>
</div>
<div id="yearModal" class="modal">
<div class="modal-content">
<h3>Год выпуска</h3>
<div class="range-inputs">
<input type="number" id="yearFrom" placeholder="От" min="1990" max="2025">
<span>—</span>
<input type="number" id="yearTo" placeholder="До" min="1990" max="2025">
</div>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('yearModal')">Отмена</button>
<button class="btn-primary" onclick="applyYear()">Применить</button>
</div>
</div>
</div>
<div id="mileageModal" class="modal">
<div class="modal-content">
<h3>Пробег (км)</h3>
<div class="range-inputs">
<input type="number" id="mileageFrom" placeholder="От">
<span>—</span>
<input type="number" id="mileageTo" placeholder="До">
</div>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('mileageModal')">Отмена</button>
<button class="btn-primary" onclick="applyMileage()">Применить</button>
</div>
</div>
</div>
<div id="cityModal" class="modal">
<div class="modal-content">
<h3>Город</h3>
<select id="citySelect">
<option value="">Все города</option>
<optgroup label="ПМР">
<option value="Тирасполь">Тирасполь</option>
<option value="Рыбница">Рыбница</option>
<option value="Дубоссары">Дубоссары</option>
<option value="Каменка">Каменка</option>
<option value="Григориополь">Григориополь</option>
<option value="Слободзея">Слободзея</option>
<option value="Днестровск">Днестровск</option>
</optgroup>
<optgroup label="Молдова">
<option value="Кишинёв">Кишинёв</option>
<option value="Бельцы">Бельцы</option>
<option value="Бендеры">Бендеры</option>
<option value="Кагул">Кагул</option>
<option value="Унгены">Унгены</option>
</optgroup>
</select>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('cityModal')">Отмена</button>
<button class="btn-primary" onclick="applyCity()">Применить</button>
</div>
</div>
</div>
<div id="regModal" class="modal">
<div class="modal-content">
<h3>Регистрация</h3>
<select id="regSelect">
<option value="">Все</option>
<option value="ПМР">ПМР</option>
<option value="Молдова">Молдова</option>
<option value="Другая">Другая</option>
</select>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeModal('regModal')">Отмена</button>
<button class="btn-primary" onclick="applyReg()">Применить</button>
</div>
</div>
</div>
<div class="section-header" onclick="showFullList('top')">
<h2 class="section-title">🔥 Топ объявления</h2>
<span class="section-view-all">Все →</span>
</div>
<div id="topListings" class="listings-grid"></div>
<div class="section-header" onclick="showFullList('new')">
<h2 class="section-title">✨ Новые поступления</h2>
<span class="section-view-all">Все →</span>
</div>
<div id="newListings" class="listings-grid"></div>
</main>
<div id="listPage" class="list-page">
<div class="detail-header">
<button class="back-button" onclick="closePage('listPage')">← Назад</button>
</div>
<div class="list-content">
<h2 class="list-title" id="listPageTitle"></h2>
<div id="listPageContent" class="listings-grid"></div>
</div>
</div>
<div id="addPage" class="add-page">
<div class="detail-header">
<button class="back-button" onclick="closePage('addPage')">← Назад</button>
</div>
<div class="add-content">
<h2 class="add-title">➕ Подать объявление</h2>
<form id="addForm" class="add-form" onsubmit="handleSubmit(event)">
<div class="form-group">
<label>Категория транспорта</label>
<select id="category" required>
<option value="">Выберите</option>
<option value="car">🚗 Легковой</option>
<option value="truck">🚚 Грузовой</option>
<option value="special">🚜 Спецтехника</option>
<option value="moto">🏍 Мототехника</option>
<option value="water">🚤 Водный</option>
</select>
</div>
<div class="form-group">
<label>Марка</label>
<input type="text" id="brand" placeholder="Toyota" required>
</div>
<div class="form-group">
<label>Модель</label>
<input type="text" id="model" placeholder="Camry" required>
</div>
<div class="form-group">
<label>Год</label>
<input type="number" id="year" placeholder="2020" min="1990" max="2025" required>
</div>
<div class="form-group">
<label>Валюта</label>
<select id="currency" required>
<option value="$">Доллар ($)</option>
<option value="€">Евро (€)</option>
</select>
</div>
<div class="form-group">
<label>Цена</label>
<input type="number" id="price" placeholder="25000" required>
</div>
<div class="form-group">
<label>Пробег (км)</label>
<input type="number" id="mileage" placeholder="45000" required>
</div>
<div class="form-group">
<label>Двигатель</label>
<input type="text" id="engine" placeholder="2.5 л" required>
</div>
<div class="form-group">
<label>Коробка</label>
<select id="transmission" required>
<option value="">Выберите</option>
<option value="Автомат">Автомат</option>
<option value="Механика">Механика</option>
<option value="Робот">Робот</option>
<option value="Вариатор">Вариатор</option>
</select>
</div>
<div class="form-group">
<label>Топливо</label>
<select id="fuel" required>
<option value="">Выберите</option>
<option value="Бензин">Бензин</option>
<option value="Дизель">Дизель</option>
<option value="Электро">Электро</option>
<option value="Гибрид">Гибрид</option>
</select>
</div>
<div class="form-group">
<label>Регистрация</label>
<select id="registration" required>
<option value="">Выберите</option>
<option value="ПМР">ПМР</option>
<option value="Молдова">Молдова</option>
<option value="Другая">Другая</option>
</select>
</div>
<div class="form-group">
<label>Город</label>
<select id="city" required>
<option value="">Выберите</option>
<optgroup label="ПМР">
<option value="Тирасполь">Тирасполь</option>
<option value="Рыбница">Рыбница</option>
<option value="Дубоссары">Дубоссары</option>
<option value="Каменка">Каменка</option>
<option value="Григориополь">Григориополь</option>
<option value="Слободзея">Слободзея</option>
<option value="Днестровск">Днестровск</option>
</optgroup>
<optgroup label="Молдова">
<option value="Кишинёв">Кишинёв</option>
<option value="Бельцы">Бельцы</option>
<option value="Бендеры">Бендеры</option>
<option value="Кагул">Кагул</option>
<option value="Унгены">Унгены</option>
</optgroup>
</select>
</div>
<div class="form-group">
<label>Фото (до 6)</label>
<div class="file-upload">
<label for="photos" class="file-upload-btn">📷 Фото</label>
<input type="file" id="photos" accept="image/*" multiple onchange="handlePhotos(event)">
<div id="photoPreview" class="file-preview"></div>
</div>
</div>
<div class="form-group">
<label>Видео (1)</label>
<div class="file-upload">
<label for="video" class="file-upload-btn">🎥 Видео</label>
<input type="file" id="video" accept="video/*" onchange="handleVideo(event)">
<div id="videoPreview" class="file-preview"></div>
</div>
</div>
<div class="form-group">
<label>Описание</label>
<textarea id="description" placeholder="Расскажите о состоянии..." rows="4" required></textarea>
</div>
<button type="submit" class="submit-btn">Опубликовать</button>
</form>
</div>
</div>
<div id="detailPage" class="detail-page">
<div class="detail-header">
<button class="back-button" onclick="closePage('detailPage')">← Назад</button>
</div>
<div id="detailContent"></div>
</div>
<nav class="bottom-nav">
<button class="nav-button active" onclick="navigate('main')">
<span class="nav-icon">🏠</span>
<span class="nav-label">Главная</span>
</button>
<button class="nav-button" onclick="navigate('add')">
<span class="nav-icon">➕</span>
<span class="nav-label">Подать</span>
</button>
<button class="nav-button" onclick="navigate('messages')">
<span class="nav-icon">💬</span>
<span class="nav-label">Сообщения</span>
</button>
<button class="nav-button" onclick="navigate('favorites')">
<span class="nav-icon">❤️</span>
<span class="nav-label">Избранное</span>
</button>
</nav>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
let tg=window.Telegram.WebApp;tg.ready();tg.expand();
let selectedCurrency='$',uploadedPhotos=[],uploadedVideo=null,currentGalleryIndex={};
const categoryNames={car:'🚗 Легковой',truck:'🚚 Грузовой',special:'🚜 Спецтехника',moto:'🏍 Мототехника',water:'🚤 Водный'};
const monthNames=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];

function daysAgo(d){return Math.floor((Date.now()-d)/86400000)}

function switchPhoto(carId,dir){
const car=cars.find(c=>c.id===carId);
if(!car||!car.photos||car.photos.length<=1)return;
if(!currentGalleryIndex[carId])currentGalleryIndex[carId]=0;
currentGalleryIndex[carId]+=dir;
if(currentGalleryIndex[carId]<0)currentGalleryIndex[carId]=car.photos.length-1;
if(currentGalleryIndex[carId]>=car.photos.length)currentGalleryIndex[carId]=0;
const cardElement=document.querySelector(`[data-car-id="${carId}"]`);
if(cardElement){
const img=cardElement.querySelector('.car-gallery img');
const dots=cardElement.querySelectorAll('.gallery-dot');
if(img)img.src=car.photos[currentGalleryIndex[carId]];
dots.forEach((dot,i)=>dot.classList.toggle('active',i===currentGalleryIndex[carId]));
}}

let detailGalleryIndex=0;
function switchDetailPhoto(dir){
const photos=document.querySelectorAll('.detail-gallery img');
if(photos.length<=1)return;
photos[detailGalleryIndex].classList.remove('active');
detailGalleryIndex+=dir;
if(detailGalleryIndex<0)detailGalleryIndex=photos.length-1;
if(detailGalleryIndex>=photos.length)detailGalleryIndex=0;
photos[detailGalleryIndex].classList.add('active');
}

function handlePhotos(e){
const files=Array.from(e.target.files).slice(0,6);
uploadedPhotos=[];
const preview=document.getElementById('photoPreview');
preview.innerHTML='';
files.forEach((file,index)=>{
const reader=new FileReader();
reader.onload=function(event){
uploadedPhotos.push(event.target.result);
const div=document.createElement('div');
div.className='file-preview-item';
div.innerHTML=`<img src="${event.target.result}"><button type="button" class="file-preview-remove" onclick="removePhoto(${index})">×</button>`;
preview.appendChild(div);
};
reader.readAsDataURL(file);
});
}

function handleVideo(e){
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(event){
uploadedVideo=event.target.result;
document.getElementById('videoPreview').innerHTML=`<div class="file-preview-item"><video src="${event.target.result}"></video><button type="button" class="file-preview-remove" onclick="removeVideo()">×</button></div>`;
};
reader.readAsDataURL(file);
}

function removePhoto(idx){
uploadedPhotos.splice(idx,1);
document.getElementById('photos').value='';
document.getElementById('photoPreview').innerHTML='';
uploadedPhotos.forEach((photo,i)=>{
const div=document.createElement('div');
div.className='file-preview-item';
div.innerHTML=`<img src="${photo}"><button type="button" class="file-preview-remove" onclick="removePhoto(${i})">×</button>`;
document.getElementById('photoPreview').appendChild(div);
});
}

function removeVideo(){
uploadedVideo=null;
document.getElementById('video').value='';
document.getElementById('videoPreview').innerHTML='';
}

function render(){
let filtered=cars.filter(c=>{
if(filters.search&&!`${c.brand} ${c.model}`.toLowerCase().includes(filters.search))return false;
if(filters.category!=='all'&&c.category!==filters.category)return false;
if(filters.brand&&c.brand!==filters.brand)return false;
if(filters.model&&c.model!==filters.model)return false;
if(filters.priceFrom&&c.currency===filters.currency&&c.price<filters.priceFrom)return false;
if(filters.priceTo&&c.currency===filters.currency&&c.price>filters.priceTo)return false;
if(filters.yearFrom&&c.year<filters.yearFrom)return false;
if(filters.yearTo&&c.year>filters.yearTo)return false;
if(filters.mileageFrom&&c.mileage<filters.mileageFrom)return false;
if(filters.mileageTo&&c.mileage>filters.mileageTo)return false;
if(filters.city&&c.city!==filters.city)return false;
if(filters.registration&&c.registration!==filters.registration)return false;
return true;
});

let top=filtered.filter(c=>c.isTop).slice(0,4);
let news=filtered.filter(c=>daysAgo(c.datePosted)<=3).sort((a,b)=>b.datePosted-a.datePosted).slice(0,4);

document.getElementById('topListings').innerHTML=top.map(makeCard).join('')||'<div class="empty-state"><div class="empty-state-icon">🔍</div><div>Ничего не найдено</div></div>';
document.getElementById('newListings').innerHTML=news.map(makeCard).join('')||'<div class="empty-state"><div class="empty-state-icon">🔍</div><div>Ничего не найдено</div></div>';
}

function makeCard(c){
currentGalleryIndex[c.id]=0;
let imageHtml='';
if(c.photos&&c.photos.length>0){
const dots=c.photos.map((p,i)=>`<span class="gallery-dot ${i===0?'active':''}"></span>`).join('');
imageHtml=`<div class="car-gallery" data-car-id="${c.id}"><img src="${c.photos[0]}"><div class="category-badge">${categoryNames[c.category]}</div>${c.photos.length>1?`<div class="gallery-arrows"><button class="gallery-arrow" onclick="event.stopPropagation();switchPhoto(${c.id},-1)">‹</button><button class="gallery-arrow" onclick="event.stopPropagation();switchPhoto(${c.id},1)">›</button></div><div class="gallery-dots">${dots}</div>`:''}</div>`;
}else{
const emoji=c.category==='car'?'🚗':c.category==='truck'?'🚚':c.category==='special'?'🚜':c.category==='moto'?'🏍':'🚤';
imageHtml=`<div class="car-image"><div class="category-badge">${categoryNames[c.category]}</div>${emoji}</div>`;
}
return`<div class="car-card" onclick="showDetail(${c.id})">${imageHtml}<div class="car-info"><div class="car-title">${c.brand} ${c.model} ${c.year}</div><div class="car-price">${fmt(c.price)} ${c.currency}</div><div class="car-specs"><span>${fmt(c.mileage)} км</span><span>${c.engine}</span></div><div class="car-location">${c.city}</div><div class="car-registration">🚘 ${c.registration}</div><div class="car-date">${formatDate(c.datePosted)}</div></div></div>`;
}

function showDetail(id){
let c=cars.find(x=>x.id===id);
let isFav=favorites.includes(id);
detailGalleryIndex=0;
let galleryHtml='';
if(c.photos&&c.photos.length>0){
const images=c.photos.map((p,i)=>`<img src="${p}" class="${i===0?'active':''}">`).join('');
galleryHtml=`<div class="detail-gallery">${images}${c.photos.length>1?`<div class="detail-gallery-arrows"><button class="detail-gallery-arrow" onclick="switchDetailPhoto(-1)">‹</button><button class="detail-gallery-arrow" onclick="switchDetailPhoto(1)">›</button></div>`:''}</div>`;
}else{
const emoji=c.category==='car'?'🚗':c.category==='truck'?'🚚':c.category==='special'?'🚜':c.category==='moto'?'🏍':'🚤';
galleryHtml=`<div class="detail-gallery">${emoji}</div>`;
}
document.getElementById('detailContent').innerHTML=`${galleryHtml}<div class="detail-info"><div class="detail-title">${c.brand} ${c.model}</div><div class="detail-date">${formatDate(c.datePosted)}</div><div class="detail-price">${fmt(c.price)} ${c.currency}</div><div class="detail-section"><div class="detail-section-title">Характеристики</div><div class="detail-specs"><div class="detail-spec-item"><div class="detail-spec-label">Категория</div><div class="detail-spec-value">${categoryNames[c.category]}</div></div><div class="detail-spec-item"><div class="detail-spec-label">Год</div><div class="detail-spec-value">${c.year}</div></div><div class="detail-spec-item"><div class="detail-spec-label">Пробег</div><div class="detail-spec-value">${fmt(c.mileage)} км</div></div><div class="detail-spec-item"><div class="detail-spec-label">Двигатель</div><div class="detail-spec-value">${c.engine}</div></div><div class="detail-spec-item"><div class="detail-spec-label">Коробка</div><div class="detail-spec-value">${c.transmission}</div></div><div class="detail-spec-item"><div class="detail-spec-label">Топливо</div><div class="detail-spec-value">${c.fuel}</div></div><div class="detail-spec-item"><div class="detail-spec-label">Город</div><div class="detail-spec-value">${c.city}</div></div><div class="detail-spec-item"><div class="detail-spec-label">Регистрация</div><div class="detail-spec-value">${c.registration}</div></div></div></div><div class="detail-section"><div class="detail-section-title">Описание</div><div>${c.description}</div></div><button class="detail-contact-btn" onclick="toggleFav(${id})">${isFav?'❤️ В избранном':'🤍 В избранное'}</button></div>`;
document.getElementById('detailPage').classList.add('show');
}

if(filters.mileageTo&&c.mileage>filters.mileageTo)return false;
if(filters.city&&c.city!==filters.city)return false;
if(filters.registration&&c.registration!==filters.registration)return false;
return true;
});

let list=type==='top'?filtered.filter(c=>c.isTop):filtered.filter(c=>daysAgo(c.datePosted)<=3).sort((a,b)=>b.datePosted-a.datePosted);
document.getElementById('listPageTitle').textContent=type==='top'?'🔥 Топ объявления':'✨ Новые поступления';
document.getElementById('listPageContent').innerHTML=list.map(makeCard).join('')||'<div class="empty-state"><div class="empty-state-icon">🔍</div><div>Ничего не найдено</div></div>';
document.getElementById('listPage').classList.add('show');
}

function toggleFav(id){
let idx=favorites.indexOf(id);
if(idx>-1)favorites.splice(idx,1);
else favorites.push(id);
localStorage.setItem('fav',JSON.stringify(favorites));
showDetail(id);
tg.showAlert(idx>-1?'Удалено':'Добавлено');
}

function navigate(page){
document.querySelectorAll('.nav-button').forEach(b=>b.classList.remove('active'));
event.target.closest('.nav-button').classList.add('active');
if(page==='main'){
closePage('addPage');
closePage('detailPage');
closePage('listPage');
}else if(page==='add'){
document.getElementById('addPage').classList.add('show');
}else if(page==='favorites'){
if(favorites.length===0){
tg.showAlert('Нет избранных');
}else{
let msg='Избранное:\n'+cars.filter(c=>favorites.includes(c.id)).map(c=>`${c.brand} ${c.model} - ${fmt(c.price)} ${c.currency}`).join('\n');
tg.showPopup({message:msg,buttons:[{type:'ok'}]});
}
}else{
tg.showAlert('В разработке');
}
}

function closePage(id){
document.getElementById(id).classList.remove('show');
}

function openModal(id){
if(id==='brandModal')updateBrandFilter();
if(id==='modelModal')updateModelFilter();
document.getElementById(id).classList.add('show');
}

function closeModal(id){
document.getElementById(id).classList.remove('show');
}

function applyPrice(){
let from=parseInt(document.getElementById('priceFrom').value);
let to=parseInt(document.getElementById('priceTo').value);
if(from>0||to>0){
filters.priceFrom=from||null;
filters.priceTo=to||null;
let text=from&&to?`${fmt(from)}-${fmt(to)}`:from?`От ${fmt(from)}`:`До ${fmt(to)}`;
document.getElementById('priceFilter').textContent=`${text} ${selectedCurrency}`;
document.getElementById('priceFilter').classList.add('active');
}
closeModal('priceModal');
render();
}

function applyYear(){
let from=parseInt(document.getElementById('yearFrom').value);
let to=parseInt(document.getElementById('yearTo').value);
if(from||to){
filters.yearFrom=from||null;
filters.yearTo=to||null;
let text=from&&to?`${from}-${to}`:from?`От ${from}`:`До ${to}`;
document.getElementById('yearFilter').textContent=text;
document.getElementById('yearFilter').classList.add('active');
}
closeModal('yearModal');
render();
}

function applyMileage(){
let from=parseInt(document.getElementById('mileageFrom').value);
let to=parseInt(document.getElementById('mileageTo').value);
if(from>0||to>0){
filters.mileageFrom=from||null;
filters.mileageTo=to||null;
let text=from&&to?`${fmt(from)}-${fmt(to)}`:from?`От ${fmt(from)}`:`До ${fmt(to)}`;
document.getElementById('mileageFilter').textContent=`${text} км`;
document.getElementById('mileageFilter').classList.add('active');
}
closeModal('mileageModal');
render();
}

function applyCity(){
let c=document.getElementById('citySelect').value;
filters.city=c;
document.getElementById('cityFilter').textContent=c||'Город';
if(c)document.getElementById('cityFilter').classList.add('active');
else document.getElementById('cityFilter').classList.remove('active');
closeModal('cityModal');
render();
}

function applyReg(){
let r=document.getElementById('regSelect').value;
filters.registration=r;
document.getElementById('regFilter').textContent=r||'Регистрация';
if(r)document.getElementById('regFilter').classList.add('active');
else document.getElementById('regFilter').classList.remove('active');
closeModal('regModal');
render();
}

function resetFilters(){
filters={search:'',category:'all',brand:'',model:'',priceFrom:null,priceTo:null,yearFrom:null,yearTo:null,mileageFrom:null,mileageTo:null,city:'',registration:'',currency:'$'};
document.getElementById('searchInput').value='';
document.getElementById('brandFilter').textContent='Марка';
document.getElementById('modelFilter').textContent='Модель';
document.getElementById('priceFilter').textContent='Цена';
document.getElementById('yearFilter').textContent='Год';
document.getElementById('mileageFilter').textContent='Пробег';
document.getElementById('cityFilter').textContent='Город';
document.getElementById('regFilter').textContent='Регистрация';
document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
selectCategory('all');
}

function handleSubmit(e){
e.preventDefault();
let newCar={
id:cars.length+1,
category:document.getElementById('category').value,
brand:document.getElementById('brand').value,
model:document.getElementById('model').value,
year:parseInt(document.getElementById('year').value),
price:parseInt(document.getElementById('price').value),
currency:document.getElementById('currency').value,
mileage:parseInt(document.getElementById('mileage').value),
engine:document.getElementById('engine').value,
transmission:document.getElementById('transmission').value,
fuel:document.getElementById('fuel').value,
city:document.getElementById('city').value,
registration:document.getElementById('registration').value,
description:document.getElementById('description').value,
photos:[...uploadedPhotos],
video:uploadedVideo,
datePosted:Date.now(),
isTop:false
};
cars.push(newCar);
tg.showAlert('Добавлено!');
document.getElementById('addForm').reset();
uploadedPhotos=[];
uploadedVideo=null;
document.getElementById('photoPreview').innerHTML='';
document.getElementById('videoPreview').innerHTML='';
closePage('addPage');
navigate('main');
render();
}

document.getElementById('searchInput').addEventListener('input',function(e){
filters.search=e.target.value.toLowerCase();
render();
});

render();
</script>
</body>
</html>
